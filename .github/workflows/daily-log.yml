name: Daily Learning Log Update

permissions:
  contents: write
on:
  schedule:
    - cron: "0 3 * * *"   #* runs every day
  workflow_dispatch:

jobs:
  update-log:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Add daily entry
        run: |
          echo "## $(date)" >> daily-learning-log.md
          echo "- Practiced development today." >> daily-learning-log.md
          echo "" >> daily-learning-log.md

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-learning-log.md
          git commit -m "Update daily learning log $(date)" || echo "No changes to commit"
          git push
